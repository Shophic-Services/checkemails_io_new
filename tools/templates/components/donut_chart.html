<svg width="200" height="200" viewBox="0 0 220 220">
  <!-- Background -->
  <circle cx="110" cy="110" r="90"
    fill="none" stroke="#e5e7eb" stroke-width="24" />

  <!-- Unknown (base) -->
  <circle cx="110" cy="110" r="90"
    fill="none" stroke="#e5e7eb" stroke-width="24"
    transform="rotate(-90 110 110)"
    stroke-dasharray="{{ dash.unknown.len }} {{ circ }}"
    stroke-dashoffset="{{ dash.unknown.offset }}" />

  <!-- Valid -->
  <circle id="seg-valid" cx="110" cy="110" r="90"
    fill="none" stroke="#22c55e" stroke-width="24"
    transform="rotate(-90 110 110)"
    stroke-dasharray="{{ dash.valid.len }} {{ circ }}"
    stroke-dashoffset="{{ dash.valid.offset }}" />

  <!-- Risky -->
  <circle id="seg-risky" cx="110" cy="110" r="90"
    fill="none" stroke="#facc15" stroke-width="24"
    transform="rotate(-90 110 110)"
    stroke-dasharray="{{ dash.risky.len }} {{ circ }}"
    stroke-dashoffset="{{ dash.risky.offset }}" />

  <!-- Invalid -->
  <circle id="seg-invalid" cx="110" cy="110" r="90"
    fill="none" stroke="#ef4444" stroke-width="24"
    transform="rotate(-90 110 110)"
    stroke-dasharray="{{ dash.invalid.len }} {{ circ }}"
    stroke-dashoffset="{{ dash.invalid.offset }}" />

  <!-- Center text -->
  <text class="delivery-perc" x="110" y="105"
    text-anchor="middle"
    font-size="20"
    font-weight="700">
    {{ percent }}%
  </text>

  <text x="110" y="125"
    text-anchor="middle"
    font-size="12"
    fill="#6b7280">
    {{label}}
  </text>
</svg>
